name: 52週高値データ取得

on:
  schedule:
    # UTC 09:30 = JST 18:30 (月〜金)
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-52week:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run_52week.py 実行
        run: python run_52week.py

      - name: CSV をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --cached --quiet || git commit -m "auto: 52week data update"
          git push
